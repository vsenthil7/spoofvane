<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}DoppelDomain{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🛡️</text></svg>">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="/">
        <span class="brand-mark">🛡️</span>
        <span class="brand-name">DoppelDomain</span>
        <span class="brand-sub">Brand-impersonation detection</span>
      </a>
      <nav class="topnav">
        <a href="/">Dashboard</a>
        <a href="/audit">Audit log</a>
        <a href="/docs">API docs</a>
        {% if mock_mode %}<span class="badge badge-mock">MOCK MODE</span>{% endif %}
      </nav>
    </div>
  </header>

  <main class="content">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <span>DoppelDomain · Bright Data Hackathon Track 3 · Security &amp; Compliance</span>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
